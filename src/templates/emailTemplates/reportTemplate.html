<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{reportTitle}}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; color: #333; }
    .container { max-width: 640px; margin: 30px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: #2d7d32; color: #fff; padding: 24px 32px; }
    .header h1 { margin: 0; font-size: 22px; }
    .body { padding: 32px; }
    .metric { display: inline-block; background: #f0f7f0; border-radius: 8px; padding: 16px 24px; margin: 8px; text-align: center; }
    .metric .value { font-size: 28px; font-weight: bold; color: #2d7d32; }
    .metric .label { font-size: 12px; color: #666; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 24px; }
    th { background: #e8f5e9; padding: 10px 12px; font-size: 13px; text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
    .footer { background: #f8f8f8; padding: 16px 32px; font-size: 12px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{reportTitle}}</h1>
      <p style="margin:4px 0 0">Period: {{period}} &bull; Generated: {{generatedAt}}</p>
    </div>
    <div class="body">
      <h2>Summary</h2>
      {{summaryMetrics}}
      <h2>Details</h2>
      {{reportContent}}
    </div>
    <div class="footer">Automatically generated by {{appName}}. For support, contact {{supportEmail}}.</div>
  </div>
</body>
</html>
