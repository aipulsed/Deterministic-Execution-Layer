<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{notificationTitle}}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 30px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { padding: 24px 32px; background: {{headerColor|#1565c0}}; color: #fff; }
    .header h1 { margin: 0; font-size: 20px; }
    .body { padding: 32px; font-size: 15px; line-height: 1.6; color: #333; }
    .cta { display: block; margin: 24px auto; width: fit-content; background: {{headerColor|#1565c0}}; color: #fff; text-decoration: none; padding: 12px 28px; border-radius: 6px; font-weight: bold; }
    .footer { background: #f8f8f8; padding: 16px 32px; font-size: 12px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{notificationTitle}}</h1>
    </div>
    <div class="body">
      <p>Hi {{recipientName}},</p>
      <p>{{notificationMessage}}</p>
      {{#if ctaUrl}}<a class="cta" href="{{ctaUrl}}">{{ctaLabel|View Details}}</a>{{/if}}
    </div>
    <div class="footer">
      You received this notification from {{appName}}.
      {{#if unsubscribeUrl}}<a href="{{unsubscribeUrl}}">Unsubscribe</a>{{/if}}
    </div>
  </div>
</body>
</html>
